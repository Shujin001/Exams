<!DOCTYPE html>
<html>
<head>
    <title>Simple Animation</title>
    <style>
        #box {
            width: 400px;
            height: 100px;
            border: 1px solid black;
            position: relative;
        }
        #ball {
            width: 40px;
            height: 40px;
            background: red;
            border-radius: 50%;
            position: absolute;
            left: 0;
            top: 30px;
        }
    </style>
</head>
<body>
    <div id="box">
        <div id="ball"></div>
    </div>

    <br>
    <button onclick="moveBall()">Start</button>
    <button onclick="stopBall()">Stop</button>

    <script>
        let ball = document.getElementById("ball");
        let position = 0;
        let animation;

        function frame() {
            position = position + 2;
            ball.style.left = position + "px";

            if (position < 360) {
                animation = requestAnimationFrame(frame);
            } else {
                position = 0;
                ball.style.left = "0px";
                animation = requestAnimationFrame(frame);
            }
        }

        function moveBall() {
            if (!animation) {
                frame();
            }
        }

        function stopBall() {
            cancelAnimationFrame(animation);
            animation = null;
        }
    </script>
</body>
</html>
