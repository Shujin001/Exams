<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Photo Gallery</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2 class="gallery-title">Our Photo Gallery</h2>

    <div class="gallery-container">
      <div class="gallery-item">
        <img src="https://placehold.co/300x200?text=Nature" alt="Nature" />
        <div class="caption">Nature Photography</div>
      </div>

      <div class="gallery-item">
        <img src="https://placehold.co/300x200?text=Technology" alt="Tech" />
        <div class="caption">Tech Innovation</div>
      </div>

      <div class="gallery-item">
        <img
          src="https://placehold.co/300x200?text=Architecture"
          alt="Architecture"
        />
        <div class="caption">Urban Design</div>
      </div>

      <div class="gallery-item">
        <img src="https://placehold.co/300x200?text=Abstract" alt="Abstract" />
        <div class="caption">Art</div>
      </div>
    </div>
  </body>
</html>
