<!doctype html>
<html>
  <head>
    <style>
      .internal-h1 {
        color: darkgreen;
        text-align: center;
      }
      .internal-p {
        font-family: Arial;
        color: brown;
      }
    </style>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <p style="color: blue; font-size: 18px">This is Inline CSS.</p>
    <h1 class="internal-h1">Internal CSS Example</h1>
    <p class="internal-p">This paragraph uses internal styling.</p>
    <h2 class="external-h2">External CSS Example</h2>
    <p class="external-p">
      The styling for this heading comes from an outside file!
    </p>
  </body>
</html>
