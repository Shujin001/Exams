<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        nav {
            background-color: #333;
            padding: 10px 20px;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .nav-links {
            list-style: none;
            display: flex;
        }

        .nav-links li {
            margin-left: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
        }

        .menu-toggle {
            display: none;
            font-size: 26px;
            color: white;
            cursor: pointer;
        }

        /* ---------- Mobile View ---------- */
        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .nav-links {
                display: none;
                flex-direction: column;
                width: 100%;
                background-color: #444;
                margin-top: 10px;
            }

            .nav-links li {
                padding: 10px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-container">
        <div class="logo">MyWebsite</div>

        <!-- Hamburger -->
        <div class="menu-toggle" id="menuBtn">&#9776;</div>

        <!-- Menu -->
        <ul class="nav-links" id="menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </div>
</nav>

<script>
    $(function () {
        $("#menuBtn").click(function () {
            $("#menu").slideToggle();

            // Toggle hamburger visibility
            $(this).toggle();
        });

        // When menu item is clicked, close menu & show hamburger again
        $("#menu a").click(function () {
            $("#menu").slideUp();
            $("#menuBtn").show();
        });
    });
</script>

</body>
</html>
