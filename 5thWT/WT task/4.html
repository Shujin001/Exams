<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Web Page</title>

    <!-- CSS for Presentation -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: auto;
            background-color: white;
            padding: 20px;
        }

        h1 {
            color: darkblue;
            text-align: center;
        }

        p {
            font-size: 16px;
            color: #333;
            line-height: 1.6;
        }

        ul {
            margin-top: 15px;
        }

        li {
            color: darkgreen;
        }

        img {
            width: 200px;
            display: block;
            margin: 20px auto;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <!-- HTML Structure -->
    <div class="container">

        <!-- a. Heading -->
        <h1>Welcome to My Web Page</h1>

        <!-- b. Paragraph -->
        <p>
            This is a simple web page designed using HTML for structure and CSS for styling.
            HTML defines the content of the page, while CSS is used to enhance its appearance.
        </p>

        <!-- c. List -->
        <h3>Features of Web Design</h3>
        <ul>
            <li>Easy to use</li>
            <li>Attractive layout</li>
            <li>Responsive design</li>
        </ul>

        <!-- OR Image (you can use either image or list in exams) -->
        <img src="./html.jpg" alt="Sample Image">

    </div>

</body>
</html>
