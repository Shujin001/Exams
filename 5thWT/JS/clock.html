<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
</head>
<body>
    <div id="clock"></div>
    <script type="text/javascript">
        setInterval(function(){
            let date = new Date(),
                year = date.getFullYear(),//0-11 as an array index
                month = date.getMonth(),
                day = date.getDate(),
                hours = date.getHours(),
                minutes = date.getMinutes(),
                seconds = date.getSeconds(),
                week = date.getDay();//0-6 as a array index

            let monthArr = ["January","February","March","April","May","June","July","August","September","October","November","December"];

            let weekArr = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

            let h = (hours % 12) == 0 ? 12 : (hours%12);
            let ampm = hours >= 12? "PM" : "AM";
            let m = minutes < 10 ? "0" + minutes : minutes;
            let s = seconds < 10 ? "0" + seconds : seconds;

            let datetime = `Today: ${monthArr[month]} ${day}, ${year} - ${h}:${m}:${s} ${ampm} - ${weekArr[week]}`;

            document.getElementById("clock").innerHTML = datetime;
        },1000);
    </script>
</body>
</html>
