<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Types of CSS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        h2 {
            color: green;
            text-align: center;
        }

        p {
            color: blue;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <!-- Inline CSS -->
    <h1 style="color: red; text-align: center;">
        This is Inline CSS
    </h1>
    <p style="color: purple; font-size: 16px;">
        This paragraph is styled using Inline CSS.
    </p>
    <hr>
    <!-- Internal CSS -->
    <h2>This is Internal CSS</h2>
    <p>
        This paragraph is styled using Internal CSS.
    </p>
    <hr>
    <!-- External CSS -->
        <h3>This is External CSS</h3>
            <p class="external">
                This paragraph is styled using External CSS.
            </p>
</body>

</html>
