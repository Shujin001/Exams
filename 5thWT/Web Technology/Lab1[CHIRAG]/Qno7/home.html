<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Image</title>
</head>
<body>
     <h2>Click on parts of the image</h2>

    <img src="chess.jpg" usemap="#map" width="360" height="360" alt="Map Image">

    <map name="map">
        <!-- Rectangle area -->
        <area shape="rect" coords="20,20,120,120" href="https://www.google.com" target="_blank" alt="Rectangle">

        <!-- Circle area -->
        <area shape="circle" coords="180,100,50" href="https://www.bing.com" target="_blank" alt="Circle">

        <!-- Polygon area -->
        <area shape="poly" coords="200,200,260,260,320,200" href="https://www.yahoo.com" target="_blank" alt="Polygon">
    </map>
</body>
</html>
