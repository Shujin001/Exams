<html>
    <head>
        <title>XML HTTP Request</title>
    </head>
    <body>
        <!--
            The XMLHttpRequest Object
            _____________________________________

            - The XMLHttpRequest Object has a built in XML Parser.
            - The responseText property returns the response as a string.
            - The responseXML property returns the response as an XML DOM object.
            - If you want to use thr response as an XML DOM object, you can use thie responseXML property.

            Note - It Deals as an AJAX (Asynchronous JavaScript and XML)
        -->
        <h2>My CD Collection:</h2>
        <button type="button" onclick="loadXMLDoc()">Get my CD collection</button>
        <p id="demo"></p>

        <script>
            function loadXMLDoc(){
                var xmlhttp = new XMLHttpRequest();
                xmlhttp.onreadystatechange = function (){
                    if (this.readyState == 4 && this.status == 200){
                        myFunction(this);
                    }
                };
                xmlhttp.open("GET", "cd_catalog.xml", true);
                xmlhttp.send();
            }

            function myFunction(xml){
                var x, i, xmlDoc, txt;
                xmlDoc = xml.responseXML;
                txt = "";
                x = xmlDoc.getElementsByTagName("ARTIST");
                for(i=0; i < x.length; i++){
                    txt += x[i].childNodes[0].nodeValue + "<br>";
                }
                document.getElementById("demo").innerHTML = txt;
            }
        </script>
    </body>
</html>
