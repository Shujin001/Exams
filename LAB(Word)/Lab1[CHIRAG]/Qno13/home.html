<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Menu</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .navbar {
            background-color: #FFFF66;
            overflow: hidden;
            padding: 10px 20px;
        }
        .navbar a {
            text-decoration: none;
            color: #000;
            padding: 8px 16px;
            margin: 0 4px;
            display: inline-block;
            border-right: 1px solid #555;
        }
        .navbar a:last-child {
            border-right: none;
        }

        .navbar a.active {
            background-color: #4B4BFF;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <a href="#" class="active">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </div>
</body>

</html>
