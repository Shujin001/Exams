<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lok Sewa Aayog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Lok Sewa Aayog Online Registration Form</h2>

<form>
    <fieldset>
        <legend>Applicant Details</legend>

        <div class="row">
            <label>Full Name</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Date of Birth</label>
            <input type="date">
        </div>

        <div class="row">
            <label>Gender</label>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
        </div>

        <div class="row">
            <label>Address</label>
            <textarea></textarea>
        </div>

        <div class="row">
            <label>Phone</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Email</label>
            <input type="email">
        </div>

        <div class="row">
            <label>Post Applied</label>
            <select>
                <option>Select Post</option>
                <option>Officer</option>
                <option>Section Officer</option>
                <option>Assistant</option>
            </select>
        </div>

        <div class="row">
            <label>Citizenship No</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Upload Photo</label>
            <input type="file">
        </div>

        <div class="row">
            <label>Upload Citizenship</label>
            <input type="file">
        </div>

        <div class="row">
            <input type="checkbox"> I declare all information is correct
        </div>

        <div class="row buttons">
            <button class="submit">Submit</button>
            <button class="reset" type="reset">Reset</button>
        </div>

    </fieldset>
</form>
</body>
</html>
