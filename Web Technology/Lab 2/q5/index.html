<!DOCTYPE html>
<html>
<head>
    <title>Array Mastery</title>
</head>
<body>
    <h1>JavaScript Array Operations</h1>
    <script>
        let arr1 = ["Apple", "Banana"];
        let arr2 = new Array("Cherry", "Date");

        console.log(Object.getPrototypeOf(arr1));
        arr1.unshift("Mango");
        arr1.push("Orange");
        arr1.shift();
        arr1.pop();

        arr1.splice(1, 0, "Grapes"); 
        arr1.splice(1, 1);

        let numbers = [10, 20, 30, 40];
        numbers.forEach(n => console.log("Item: " + n));
        let doubled = numbers.map(n => n * 2);
        let bigOnes = numbers.filter(n => n > 25);
        let sum = numbers.reduce((total, n) => total + n, 0);

        console.log("Array length: " + numbers.length);
        for (let i = 0; i < numbers.length; i++) {
            console.log("Loop element: " + numbers[i]);
        }
        console.log("Second element: " + numbers[1]);

        let [first, second] = numbers;
        console.log("Destructured: " + first + ", " + second);
    </script>
</body>
</html>
